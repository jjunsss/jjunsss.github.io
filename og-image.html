<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #0c0c1d; }
body {
    width: 1080px; height: 1080px;
    background: linear-gradient(180deg, #0c0c1d 0%, #141432 100%);
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    position: relative;
}

body::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.12) 2px,
        rgba(0,0,0,0.12) 4px
    );
    pointer-events: none;
    z-index: 10;
}

.stars {
    position: absolute; inset: 0;
    overflow: hidden;
}
.star {
    position: absolute;
    width: 3px; height: 3px;
    background: #fff;
    border-radius: 50%;
    opacity: 0.25;
}

.content {
    display: flex; flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1;
}

.top-label {
    font-size: 11px;
    color: #FBBF24;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 12px;
}

.name {
    font-size: 42px;
    color: #fff;
    text-shadow: 0 0 20px rgba(129,140,248,0.6), 2px 2px 0 #4F46E5;
    margin-bottom: 8px;
    letter-spacing: 3px;
}

.subtitle {
    font-size: 13px;
    color: #818CF8;
    letter-spacing: 3px;
    margin-bottom: 48px;
}

.invite {
    font-size: 32px;
    color: #FBBF24;
    letter-spacing: 6px;
    text-shadow: 0 0 20px rgba(251,191,36,0.5), 2px 2px 0 #92400E;
    margin-bottom: 48px;
}

.bottom {
    display: flex;
    align-items: center;
    gap: 28px;
}
.press-start {
    font-size: 12px;
    color: #666;
    letter-spacing: 3px;
    animation: blink 1.2s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

.url {
    font-size: 11px;
    color: #555;
    letter-spacing: 2px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
}
</style>
</head>
<body>
<div class="stars">
    <div class="star" style="top:8%;left:5%"></div>
    <div class="star" style="top:15%;left:22%"></div>
    <div class="star" style="top:5%;left:45%"></div>
    <div class="star" style="top:12%;left:78%"></div>
    <div class="star" style="top:20%;left:92%"></div>
    <div class="star" style="top:82%;left:8%"></div>
    <div class="star" style="top:88%;left:35%"></div>
    <div class="star" style="top:78%;left:62%"></div>
    <div class="star" style="top:90%;left:88%"></div>
    <div class="star" style="top:50%;left:3%"></div>
    <div class="star" style="top:45%;left:96%"></div>
    <div class="star" style="top:35%;left:12%"></div>
    <div class="star" style="top:65%;left:85%"></div>
</div>

<div class="content">
    <div class="top-label">— PLAYER SELECT —</div>
    <div class="name">Junsu Kim</div>
    <div class="subtitle">AI RESEARCHER  ·  UNIST AIGS</div>

    <div class="invite">COME CHECK IT OUT!</div>

    <div class="bottom">
        <div class="press-start">▶ CLICK TO START</div>
        <div class="url">jjunsss.github.io</div>
    </div>
</div>
</body>
</html>
